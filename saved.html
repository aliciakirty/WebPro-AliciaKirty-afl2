body {

/* NAVBAR */
.navbar {
  height: 100px;
  background: #E98D2E;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
}

.left {
  display: flex;
  gap: 30px;
  align-items: center;
}

.avatar {
  width: 40px;
  height: 40px;

  border-radius: 50%;
}

    height: 190px;

.right {

}

.logo-text {
  color: white;
  font-size: 35px;

  font-weight: bold;
}

.logo-img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
}

.search {
  width: 250px;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

.nav-right {
  display: flex;
  align-items: center;
}

.signup {
  background: #f5f5f5;
  border: none;
  padding: 8px 18px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.signup:hover {
  background: #e0e0e0;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 100px;
  left: 0;
  width: 220px;
  height: calc(100% - 70px);
  background: #70A7BD;
  padding: 25px;
  border-radius: 0 10px 10px 0;
}

.sidebar a {
  display: block;
  margin: 15px 0;
  text-decoration: none;
  color: black;
  font-size: 16px;
}

/* ACTIVE (yang diklik) */
.sidebar a.active {
  font-weight: bold;
}

/* HOVER */
.sidebar a:hover {
  opacity: 0.7;
}

/* CONTENT */
.container {
  margin-left: 240px;
  padding: 30px;
}

/* GRID */
.title {
  background: #9aa4b3;
  padding: 6px 20px;
  border-radius: 20px;
  margin-bottom: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  height: 190px;
  background: #dcdcdc;
  border-radius: 15px;
  position: relative;
  box-shadow: 0 3px 5px rgba(0,0,0,0.1);
}

/* LABEL */
.label {
  position: absolute;
  bottom: 10px;
  left: 20px;
  background: #DAC972;
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 15px;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #df862f;
  color: white;
  text-align: right;
  padding: 10px;
